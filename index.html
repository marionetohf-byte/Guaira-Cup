<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guaira Cup 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

header{
    background:linear-gradient(135deg,#000,#222);
    text-align:center;
    padding:50px 20px;
    border-bottom:5px solid gold;
}

header h1{
    color:gold;
    font-size:45px;
}

header p{
    margin-top:10px;
    color:#ddd;
}

.container{
    max-width:700px;
    margin:30px auto;
    padding:25px;
}

.info{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    border-left:5px solid gold;
    margin-bottom:25px;
}

.info p{
    margin:10px 0;
}

.formulario{
    background:#1a1a1a;
    padding:25px;
    border-radius:15px;
}

.formulario h2{
    color:gold;
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:gold;
    color:black;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffd700;
}

footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>🏆 Guaira Cup 2026</h1>
    <p>Inscreva seu time e participe da disputa pelo título!</p>
</header>

<div class="container">

    <div class="info">
        <p><b>🏆 Organização:</b> Guaira Cup</p>
        <p><b>📍 Local:</b> AABB</p>
        <p><b>⚽ Categoria:</b> Sub-11</p>

        <p><b>🥇 1º Lugar:</b> Troféu e Medalhas</p>
        <p><b>🥈 2º Lugar:</b> Troféu e Medalhas</p>
        <p><b>🥉 3º Lugar:</b> Troféu e Medalhas</p>
    </div>

    <div class="formulario">

        <h2>📝 Inscrição do Time</h2>

        <form onsubmit="enviarWhatsApp(); return false;">

            <label>⚽ Nome do Time</label>
            <input id="time" type="text" required>

            <label>👤 Nome do Responsável</label>
            <input id="responsavel" type="text" required>

            <label>📱 WhatsApp</label>
            <input id="whatsapp" type="text" required>

            <label>📷 Instagram do Time</label>
            <input id="instagram" type="text">

            <label>👥 Quantidade de Jogadores</label>
            <input id="jogadores" type="number" required>

            <label>📝 Nome dos Jogadores</label>
            <textarea id="nomes" rows="4"></textarea>

            <label>🖼️ Link da Foto ou Escudo do Time</label>
            <input id="foto" type="text">

            <label>📍 Cidade/Bairro</label>
            <input id="cidade" type="text">

            <label>ℹ️ Observações</label>
            <textarea id="obs" rows="3"></textarea>

            <button type="submit">
                Enviar Inscrição pelo WhatsApp
            </button>

        </form>

    </div>

</div>

<footer>
    Guaira Cup © 2026 — Organização Guaira Cup
</footer>

<script>
function enviarWhatsApp(){

let time = document.getElementById("time").value;
let responsavel = document.getElementById("responsavel").value;
let whatsapp = document.getElementById("whatsapp").value;
let instagram = document.getElementById("instagram").value;
let jogadores = document.getElementById("jogadores").value;
let nomes = document.getElementById("nomes").value;
let foto = document.getElementById("foto").value;
let cidade = document.getElementById("cidade").value;
let obs = document.getElementById("obs").value;

let mensagem =
"🏆 INSCRIÇÃO GUAIRA CUP 2026\n\n" +
"⚽ Time: " + time + "\n" +
"👤 Responsável: " + responsavel + "\n" +
"📱 WhatsApp: " + whatsapp + "\n" +
"📷 Instagram: " + instagram + "\n" +
"👥 Jogadores: " + jogadores + "\n" +
"📝 Lista dos jogadores: " + nomes + "\n" +
"🖼️ Foto/Escudo: " + foto + "\n" +
"📍 Cidade/Bairro: " + cidade + "\n" +
"ℹ️ Observações: " + obs;

let numero = "5517991967424";

let link =
"https://wa.me/" +
numero +
"?text=" +
encodeURIComponent(mensagem);

window.open(link, "_blank");
}
</script>

</body>
</html>
