<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guaira Cup</title>
</head>
<body>
<h1>🏆 Guaira Cup</h1>
<p>Inscreva seu time no campeonato</p>

<form onsubmit="enviarWhatsApp(); return false;">
  <input id="time" placeholder="Nome do Time" required><br><br>
  <input id="responsavel" placeholder="Nome do Responsável" required><br><br>
  <input id="whatsapp" placeholder="WhatsApp" required><br><br>
  <input id="jogadores" placeholder="Quantidade de Jogadores" required><br><br>
  <textarea id="obs" placeholder="Observações"></textarea><br><br>
  <button type="submit">Enviar Inscrição</button>
</form>

<script>
function enviarWhatsApp() {
  let time = document.getElementById("time").value;
  let responsavel = document.getElementById("responsavel").value;
  let whatsapp = document.getElementById("whatsapp").value;
  let jogadores = document.getElementById("jogadores").value;
  let obs = document.getElementById("obs").value;

  let mensagem =
    "🏆 Inscrição Guaira Cup\n\n" +
    "Time: " + time + "\n" +
    "Responsável: " + responsavel + "\n" +
    "WhatsApp: " + whatsapp + "\n" +
    "Jogadores: " + jogadores + "\n" +
    "Observações: " + obs;

  let numero = "5517991967424";
  let link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
  window.location.href = link;
}
</script>
</body>
</html>
