<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guaira Cup - Inscrição</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #050505, #1c1c1c);
  color: white;
}

header {
  text-align: center;
  padding: 45px 20px;
  background: linear-gradient(135deg, #000, #222);
  border-bottom: 5px solid gold;
}

header h1 {
  color: gold;
  font-size: 42px;
  margin: 0;
}

header p {
  color: #ddd;
  font-size: 18px;
}

.container {
  max-width: 600px;
  margin: 25px auto;
  padding: 25px;
  background: #151515;
  border-radius: 18px;
  box-shadow: 0 0 18px rgba(255, 215, 0, 0.3);
}

h2 {
  color: gold;
  text-align: center;
}

.info {
  background: #222;
  padding: 15px;
  border-left: 4px solid gold;
  border-radius: 10px;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-top: 14px;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 13px;
  margin-top: 6px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
}

button {
  margin-top: 22px;
  width: 100%;
  padding: 15px;
  background: gold;
  color: black;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <h1>🏆 Guaira Cup</h1>
  <p>Inscreva seu time no campeonato</p>
</header>

<div class="container">
  <h2>📝 Formulário de Inscrição</h2>

  <div class="info">
    <p><b>Organização:</b> Guaira Cup</p>
    <p><b>📍 Local:</b> A definir</p>
    <p><b>⚽ Categoria:</b> Sub-11</p>
    <p><b>🏅 Premiação:</b> Troféus e medalhas</p>
  </div>

  <form onsubmit="enviarWhatsApp(); return false;">
    <label>Nome do Time</label>
    <input id="time" placeholder="Ex: Leões FC" required>

    <label>Nome do Responsável</label>
    <input id="responsavel" placeholder="Seu nome" required>

    <label>WhatsApp do Responsável</label>
    <input id="whatsapp" placeholder="Ex: (17) 99999-9999" required>

    <label>Instagram do Time</label>
    <input id="instagram" placeholder="@nomedotime">

    <label>Quantidade de Jogadores</label>
    <input id="jogadores" type="number" placeholder="Ex: 8" required>

    <label>Nome dos Jogadores</label>
    <textarea id="nomes" rows="4" placeholder="Digite os nomes dos jogadores"></textarea>

    <label>Link da Foto ou Escudo do Time</label>
    <input id="foto" placeholder="Cole o link da foto ou escudo">

    <label>Cidade/Bairro</label>
    <input id="cidade" placeholder="Ex: Guaíra/SP">

    <label>Observações</label>
    <textarea id="obs" rows="3" placeholder="Algo importante sobre o time"></textarea>

    <button type="submit">Enviar Inscrição pelo WhatsApp</button>
  </form>
</div>

<footer>
  Guaira Cup © 2026 — Organização Guaira Cup
</footer>

<script>
function enviarWhatsApp() {
  let time = document.getElementById("time").value;
  let responsavel = document.getElementById("responsavel").value;
  let whatsapp = document.getElementById("whatsapp").value;
  let instagram = document.getElementById("instagram").value;
  let jogadores = document.getElementById("jogadores").value;
  let nomes = document.getElementById("nomes").value;
  let foto = document.getElementById("foto").value;
  let cidade = document.getElementById("cidade").value;
  let obs = document.getElementById("obs").value;

  let mensagem =
    "🏆 INSCRIÇÃO GUAIRA CUP\n\n" +
    "⚽ Time: " + time + "\n" +
    "👤 Responsável: " + responsavel + "\n" +
    "📱 WhatsApp: " + whatsapp + "\n" +
    "📷 Instagram: " + instagram + "\n" +
    "👥 Quantidade de jogadores: " + jogadores + "\n" +
    "📝 Jogadores: " + nomes + "\n" +
    "🖼️ Foto/Escudo: " + foto + "\n" +
    "📍 Cidade/Bairro: " + cidade + "\n" +
    "ℹ️ Observações: " + obs;

  let numero = "5517991967424";
  let link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);
  window.location.href = link;
}
</script>

</body>
</html>
